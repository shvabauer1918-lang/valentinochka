<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Нажми на сердечко ❤️</title>
  <meta name="description" content="Haz clic en el corazón para liberar frases de amor. Optimizado para un rendimiento fluido en móviles." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      width: 100vw;
      background: radial-gradient(ellipse at 40% 50%, #2b1b3a, #0b0b1f);
      font-family: 'Sour Gummy', cursive;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
    }

    .scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(2px 2px at 15% 30%, #fff9e6, rgba(0,0,0,0)),
        radial-gradient(3px 3px at 72% 18%, #ffe6f0, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 88% 67%, #b3d9ff, rgba(0,0,0,0)),
        radial-gradient(4px 4px at 8% 82%, #ffb3d9, rgba(0,0,0,0)),
        radial-gradient(3px 3px at 43% 91%, #ffffff, rgba(0,0,0,0)),
        radial-gradient(5px 5px at 95% 44%, #ffccf0, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 28% 12%, #ff99bb, rgba(0,0,0,0)),
        radial-gradient(3px 3px at 52% 76%, #f2d9ff, rgba(0,0,0,0)),
        radial-gradient(4px 4px at 63% 39%, #ffe6b3, rgba(0,0,0,0)),
        radial-gradient(circle at 20% 40%, rgba(255, 140, 200, 0.1) 0%, transparent 30%),
        radial-gradient(circle at 90% 70%, rgba(170, 120, 255, 0.12) 0%, transparent 40%);
      background-repeat: no-repeat;
      pointer-events: none;
      z-index: 0;
    }

    .scene::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="15" cy="18" r="1.2" fill="%23ffeef5" opacity="0.8"/><circle cx="87" cy="43" r="1.5" fill="%23ffe0f0" opacity="0.7"/><circle cx="33" cy="85" r="1" fill="%23ffffff" opacity="0.9"/><circle cx="71" cy="12" r="1.8" fill="%23ffcce6" opacity="0.6"/><circle cx="5" cy="60" r="1.3" fill="%23d9b3ff" opacity="0.8"/><circle cx="58" cy="94" r="1.1" fill="%23ffb3d1" opacity="0.7"/></svg>');
      background-size: 200px 200px;
      opacity: 0.4;
      animation: floatStars 60s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes floatStars {
      0% { background-position: 0 0; }
      100% { background-position: 200px 200px; }
    }

    /* ===== МЕСТА ДЛЯ ФОТОГРАФИЙ (ИЗНАЧАЛЬНО ПУСТЫЕ) ===== */
    .photo-place {
      position: absolute;
      width: min(200px, 28vw);
      height: min(260px, 35vh);
      border-radius: 30px 10px 30px 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 3px dashed rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 30px rgba(255, 105, 180, 0.3);
      transform: rotate(var(--rot, 0deg)) scale(1);
      transition: all 0.3s ease;
      z-index: var(--z, 5);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }

    .photo-place::before {
      content: "👆";
      font-size: 3rem;
      opacity: 0.5;
      color: white;
      text-shadow: 0 0 20px #ff99bb;
    }

    .photo-place:hover {
      border-color: #ff99bb;
      background: rgba(255, 105, 180, 0.2);
      box-shadow: 0 0 40px #ff99bb;
      transform: rotate(0deg) scale(1.05);
    }

    .photo-place.clicked {
      border: none;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
    }

    .photo-place.clicked::before {
      display: none;
    }

    /* ===== ФОТОГРАФИИ (ИЗНАЧАЛЬНО СКРЫТЫ) ===== */
    .photo {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 30px 10px 30px 10px;
      overflow: hidden;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.7), 0 0 0 4px rgba(255, 215, 230, 0.9) inset;
      transform: rotate(var(--rot, 0deg)) scale(0);
      transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55), box-shadow 0.3s ease;
      z-index: var(--z, 5);
      backdrop-filter: blur(2px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      opacity: 0;
      pointer-events: none;
    }

    .photo.visible {
      transform: rotate(var(--rot, 0deg)) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(1.1) contrast(1.1);
    }

    .photo-left-center {
      --rot: -8deg;
      --z: 10;
      left: 0%;
      top: 15%;
      width: min(220px, 30vw);
      height: min(280px, 38vh);
    }

    .photo-right-center {
      --rot: 6deg;
      --z: 8;
      right: 0%;
      top: 10%;
      width: min(210px, 29vw);
      height: min(270px, 37vh);
    }

    .photo-bottom-left {
      --rot: -12deg;
      --z: 15;
      left: 5%;
      bottom: 5%;
      width: min(230px, 32vw);
      height: min(300px, 42vh);
    }

    .photo-bottom-right {
      --rot: 10deg;
      --z: 12;
      right: 5%;
      bottom: 8%;
      width: min(225px, 31vw);
      height: min(290px, 40vh);
    }

    .photo:hover {
      transform: rotate(0deg) scale(1.15) !important;
      z-index: 100 !important;
      box-shadow: 0 30px 45px hotpink, 0 0 0 5px white inset;
    }

    /* ===== МЕСТА ДЛЯ ФОТОГРАФИЙ (ТЕ ЖЕ ПОЗИЦИИ) ===== */
    .place-left-center {
      --rot: -8deg;
      --z: 9;
      left: 0%;
      top: 15%;
      width: min(220px, 30vw);
      height: min(280px, 38vh);
    }

    .place-right-center {
      --rot: 6deg;
      --z: 7;
      right: 0%;
      top: 10%;
      width: min(210px, 29vw);
      height: min(270px, 37vh);
    }

    .place-bottom-left {
      --rot: -12deg;
      --z: 14;
      left: 5%;
      bottom: 5%;
      width: min(230px, 32vw);
      height: min(300px, 42vh);
    }

    .place-bottom-right {
      --rot: 10deg;
      --z: 11;
      right: 5%;
      bottom: 8%;
      width: min(225px, 31vw);
      height: min(290px, 40vh);
    }

    /* ===== СЕРДЦЕ (ИЗНАЧАЛЬНО СКРЫТО) ===== */
    .heart-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 50;
      filter: drop-shadow(0 10px 18px #ff99aa);
      transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      opacity: 0;
      pointer-events: none;
    }

    .heart-container.visible {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .heart-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.2s;
    }

    .heart-btn:active {
      transform: scale(0.94);
    }

    .heart {
      display: block;
      width: min(140px, 25vw);
      height: min(140px, 25vw);
      animation: pulse 1.4s infinite ease-in-out;
      filter: drop-shadow(0 8px 18px #ff3b6f);
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      25% { transform: scale(1.12); }
      45% { transform: scale(1.08); }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .core {
      transition: all 0.2s;
    }

    .shine {
      fill: white;
      opacity: 0.5;
      transform-origin: 70px 50px;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.1); }
      100% { opacity: 0.3; transform: scale(1); }
    }

    .music-player {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      background: rgba(25, 10, 25, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(255, 150, 200, 0.5);
      box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3);
      z-index: 100;
    }

    .play-pause-btn {
      background: #ff4d7a;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
      box-shadow: 0 4px 8px #b3003b;
    }

    .play-pause-btn svg {
      width: 26px;
      height: 26px;
      fill: white;
    }

    .progress-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .song-info {
      font-size: 0.75rem;
      color: #ffe2f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
      text-shadow: 0 1px 3px black;
    }

    .progress-bar {
      background: rgba(255, 255, 255, 0.2);
      height: 5px;
      border-radius: 10px;
      width: 100%;
      cursor: pointer;
      margin-bottom: 4px;
    }

    .progress-fill {
      height: 5px;
      background: linear-gradient(90deg, #ffb3d9, #ff1a4f);
      border-radius: 10px;
      width: 0%;
    }

    .time-display {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: #ffd9e6;
    }

    /* Контейнер для разлетающихся фраз */
    .phrases-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      overflow: visible;
    }

    .flying-phrase {
      position: absolute;
      background: rgba(40, 10, 30, 0.9);
      backdrop-filter: blur(8px);
      padding: 12px 24px;
      border-radius: 40px;
      color: #fff0f5;
      font-size: clamp(1.1rem, 4.5vw, 1.4rem);
      white-space: nowrap;
      border: 2px solid #ff99bb;
      box-shadow: 0 0 30px #ff3377, 0 0 60px rgba(255, 51, 119, 0.3);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-shadow: 0 0 12px #ff3377;
      transform-origin: center;
      z-index: 200;
      animation: flyAway 3s ease-out forwards;
    }

    @keyframes flyAway {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--fly-x, 200px), var(--fly-y, -200px)) rotate(var(--fly-rotate, 15deg)) scale(0.5);
      }
    }

    .floating-message {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(40, 10, 30, 0.8);
      backdrop-filter: blur(6px);
      padding: 12px 24px;
      border-radius: 60px;
      color: #fff0f5;
      font-size: clamp(1.1rem, 5vw, 1.5rem);
      white-space: nowrap;
      border: 1px solid #ff99bb;
      box-shadow: 0 0 25px hotpink;
      z-index: 200;
      transition: opacity 0.4s;
      pointer-events: none;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-shadow: 0 0 8px #ff3377;
    }

    .hidden {
      opacity: 0;
      visibility: hidden;
    }

    /* Сообщение о прогрессе */
    .progress-message {
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(40, 10, 30, 0.8);
      backdrop-filter: blur(6px);
      padding: 8px 16px;
      border-radius: 40px;
      color: white;
      font-size: 1rem;
      border: 1px solid #ff99bb;
      box-shadow: 0 0 20px #ff3377;
      z-index: 300;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <!-- МЕСТА ДЛЯ ФОТОГРАФИЙ (ИЗНАЧАЛЬНО ВИДНЫ) -->
    <div class="photo-place place-left-center" id="place1"></div>
    <div class="photo-place place-right-center" id="place2"></div>
    <div class="photo-place place-bottom-left" id="place3"></div>
    <div class="photo-place place-bottom-right" id="place4"></div>

    <!-- ФОТОГРАФИИ (ИЗНАЧАЛЬНО СКРЫТЫ) -->
    <div class="photo photo-left-center" id="photo1">
      <img src="photo_2025-09-28_14-07-24.jpg" alt="Фото лево">
    </div>
    <div class="photo photo-right-center" id="photo2">
      <img src="photo_2025-11-11_22-27-08.jpg" alt="Фото право">
    </div>
    <div class="photo photo-bottom-left" id="photo3">
      <img src="photo_2025-12-19_13-25-31.jpg" alt="Фото низ лево">
    </div>
    <div class="photo photo-bottom-right" id="photo4">
      <img src="photo_2026-02-14_14-29-49.jpg" alt="Фото низ право">
    </div>

    <div class="heart-container" id="heartContainer">
      <button class="heart-btn" id="heartBtn">
        <span class="heart">
          <svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="g" cx="50%" cy="40%" r="70%">
                <stop offset="0%" stop-color="#ff5f7a" />
                <stop offset="40%" stop-color="#ff2b4f" />
                <stop offset="100%" stop-color="#c91534" />
              </radialGradient>
            </defs>
            <path class="core" d="M100,162.2C17.7,99.5,6,77.5,6,52.3C6,27.1,27.1,6,52.3,6c15.4,0,30.8,7.7,40,20.6l7.7,9.6l7.7-9.6 c9.2-12.9,24.6-20.6,40-20.6c25.2,0,46.3,21.1,46.3,46.3c0,25.2-11.7,47.2-94,109.9L100,162.2L100,162.2z" fill="url(#g)"/>
            <path class="shine" d="M73 47c-12 0-23 6-29 16-2 3-1 7 2 9 3 2 7 1 9-2 4-7 12-11 20-11 4 0 7-3 7-7s-3-5-9-5Z"/>
          </svg>
        </span>
      </button>
    </div>

    <!-- Контейнер для разлетающихся фраз -->
    <div class="phrases-container" id="phrasesContainer"></div>

    <div class="music-player" id="musicPlayer">
      <button class="play-pause-btn" id="playPauseBtn">
        <svg id="playIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: none;">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
      <div class="progress-container">
        <div class="song-info">Я тебя люблю, мисс Барашкинс❤️</div>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
    </div>

    <!-- Сообщение для долгого нажатия -->
    <div id="floatingMessage" class="floating-message hidden">🎉 +3 ФРАЗЫ! 🎉</div>
    
    <!-- Сообщение о прогрессе -->
    <div id="progressMessage" class="progress-message hidden"></div>
  </div>

  <audio id="audioPlayer" loop>
    <source src="Skriptonit_-_Kosmos_53094929.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {
      // ===== ЭЛЕМЕНТЫ =====
      const places = [
        document.getElementById('place1'),
        document.getElementById('place2'),
        document.getElementById('place3'),
        document.getElementById('place4')
      ];
      
      const photos = [
        document.getElementById('photo1'),
        document.getElementById('photo2'),
        document.getElementById('photo3'),
        document.getElementById('photo4')
      ];
      
      const heartContainer = document.getElementById('heartContainer');
      const heartBtn = document.getElementById('heartBtn');
      const progressMessage = document.getElementById('progressMessage');
      
      const audio = document.getElementById('audioPlayer');
      const playPauseBtn = document.getElementById('playPauseBtn');
      const playIcon = document.getElementById('playIcon');
      const pauseIcon = document.getElementById('pauseIcon');
      const progressFill = document.getElementById('progressFill');
      const progressBar = document.getElementById('progressBar');
      const currentTimeSpan = document.getElementById('currentTime');
      const totalTimeSpan = document.getElementById('totalTime');
      const floatingMsg = document.getElementById('floatingMessage');
      const phrasesContainer = document.getElementById('phrasesContainer');

      // ===== СОСТОЯНИЕ =====
      let photosRevealed = [false, false, false, false]; // какие фото появились
      let heartRevealed = false; // появилось ли сердце

      // ===== ФРАЗЫ =====
      const loveMessages = [
        "🌸 Ты красива, как весна",
        "💫 Я хочу быть с тобой всегда",
        "✨ Лучше тебя нет ничего",
        "☀️ Моё солнышко",
        "🌅 Ты прекрасна, как закат",
        "💖 Моя любимая",
        "💗 Обожаю тебя",
        "🦋 Твои волосы шикарны",
        "🌙 Ты красива, как ночь у берега",
        "💞 ЭТО ЛЮБОВЬ"
      ];

      let availableIndices = [];

      function getRandomPhrase() {
        if (availableIndices.length === 0) {
          availableIndices = loveMessages.map((_, index) => index);
        }
        const randomPosition = Math.floor(Math.random() * availableIndices.length);
        const phraseIndex = availableIndices[randomPosition];
        availableIndices.splice(randomPosition, 1);
        return loveMessages[phraseIndex];
      }

      // ===== ПОКАЗ ФОТОГРАФИИ =====
      function revealPhoto(index) {
        if (!photosRevealed[index]) {
          // Помечаем как открытое
          photosRevealed[index] = true;
          
          // Скрываем место
          places[index].classList.add('clicked');
          
          // Показываем фото с анимацией
          photos[index].classList.add('visible');
          
          // Считаем сколько осталось
          const remainingCount = photosRevealed.filter(revealed => !revealed).length;
          
          if (remainingCount > 0) {
            let message;
            if (remainingCount === 1) {
              message = "✨ Осталось найти 1 фото ✨";
            } else {
              message = `✨ Осталось найти ${remainingCount} фото ✨`;
            }
            showProgressMessage(message);
          }
          
          // Проверяем, все ли фото открыты
          checkAllPhotosRevealed();
        }
      }

      // ===== ПРОВЕРКА ВСЕХ ФОТО =====
      function checkAllPhotosRevealed() {
        const allRevealed = photosRevealed.every(revealed => revealed === true);
        
        if (allRevealed && !heartRevealed) {
          // Показываем сердце с анимацией
          setTimeout(() => {
            heartContainer.classList.add('visible');
            heartRevealed = true;
            
            // Показываем сообщение
            showProgressMessage("❤️ Сердце появилось! Нажми на него ❤️");
            
            // Автоматически запускаем музыку
            audio.play().catch(() => {});
            updateButtonState();
          }, 500);
        }
      }

      // ===== ПОКАЗ СООБЩЕНИЯ О ПРОГРЕССЕ =====
      function showProgressMessage(text) {
        progressMessage.textContent = text;
        progressMessage.classList.remove('hidden');
        
        clearTimeout(window.progressTimeout);
        window.progressTimeout = setTimeout(() => {
          progressMessage.classList.add('hidden');
        }, 2000);
      }

      // ===== НАЗНАЧАЕМ ОБРАБОТЧИКИ НА МЕСТА =====
      places.forEach((place, index) => {
        place.addEventListener('click', (e) => {
          e.stopPropagation();
          revealPhoto(index);
        });
      });

      // ===== СОЗДАНИЕ РАЗЛЕТАЮЩЕЙСЯ ФРАЗЫ =====
      function createFlyingPhrase(phrase, customX = null, customY = null) {
        const phraseElement = document.createElement('div');
        phraseElement.className = 'flying-phrase';
        phraseElement.textContent = phrase;

        const heartRect = heartBtn.getBoundingClientRect();
        const sceneRect = document.querySelector('.scene').getBoundingClientRect();
        
        const startX = customX !== null ? customX : (heartRect.left - sceneRect.left) + heartRect.width / 2;
        const startY = customY !== null ? customY : (heartRect.top - sceneRect.top) + heartRect.height / 2;
        
        phraseElement.style.left = (startX - 60) + 'px';
        phraseElement.style.top = (startY - 25) + 'px';

        const directions = [
          { x: 200, y: -250, rotate: 15 },
          { x: -200, y: -250, rotate: -15 },
          { x: 250, y: -150, rotate: 10 },
          { x: -250, y: -150, rotate: -10 },
          { x: 150, y: -300, rotate: 20 },
          { x: -150, y: -300, rotate: -20 },
          { x: 300, y: -100, rotate: 8 },
          { x: -300, y: -100, rotate: -8 },
          { x: 100, y: -350, rotate: 12 },
          { x: -100, y: -350, rotate: -12 }
        ];

        const direction = directions[Math.floor(Math.random() * directions.length)];
        
        const varianceX = (Math.random() - 0.5) * 100;
        const varianceY = (Math.random() - 0.5) * 50;
        const varianceRotate = (Math.random() - 0.5) * 10;
        
        phraseElement.style.setProperty('--fly-x', (direction.x + varianceX) + 'px');
        phraseElement.style.setProperty('--fly-y', (direction.y + varianceY) + 'px');
        phraseElement.style.setProperty('--fly-rotate', (direction.rotate + varianceRotate) + 'deg');

        const scale = 0.8 + Math.random() * 0.7;
        phraseElement.style.fontSize = (1.3 * scale) + 'rem';
        
        const duration = 2.5 + Math.random() * 2;
        phraseElement.style.animation = `flyAway ${duration}s ease-out forwards`;

        const colors = ['#ff99bb', '#ff66aa', '#ff88cc', '#ffaaff', '#ffb3d9'];
        phraseElement.style.borderColor = colors[Math.floor(Math.random() * colors.length)];

        phrasesContainer.appendChild(phraseElement);

        setTimeout(() => {
          if (phraseElement.parentNode) {
            phraseElement.remove();
          }
        }, duration * 1000);
      }

      // ===== ОДНА ФРАЗА =====
      function createSinglePhrase() {
        const phrase = getRandomPhrase();
        createFlyingPhrase(phrase);
      }

      // ===== ТРИ ФРАЗЫ =====
      function createTriplePhrase() {
        for (let i = 0; i < 3; i++) {
          setTimeout(() => {
            const phrase = getRandomPhrase();
            createFlyingPhrase(phrase);
          }, i * 150);
        }
      }

      // ===== ОБРАБОТЧИК НАЖАТИЯ НА СЕРДЦЕ =====
      function showLoveMessage() {
        if (heartRevealed) {
          createSinglePhrase();
        }
      }

      // ===== ДОЛГОЕ НАЖАТИЕ НА СЕРДЦЕ =====
      let pressTimer;
      const longPressDuration = 800;

      heartBtn.addEventListener('mousedown', startPress);
      heartBtn.addEventListener('touchstart', startPress, { passive: false });
      
      function startPress(e) {
        if (!heartRevealed) return;
        e.preventDefault();
        pressTimer = setTimeout(() => {
          createTriplePhrase();
          floatingMsg.classList.remove('hidden');
          setTimeout(() => floatingMsg.classList.add('hidden'), 2000);
        }, longPressDuration);
      }

      heartBtn.addEventListener('mouseup', clearPressTimer);
      heartBtn.addEventListener('mouseleave', clearPressTimer);
      heartBtn.addEventListener('touchend', clearPressTimer);
      heartBtn.addEventListener('touchcancel', clearPressTimer);

      function clearPressTimer() {
        clearTimeout(pressTimer);
      }

      // ===== ФУНКЦИИ ДЛЯ МУЗЫКИ =====
      function formatTime(seconds) {
        if (isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
      }

      function updateProgress() {
        if (!audio.duration) return;
        const percent = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = percent + '%';
        currentTimeSpan.textContent = formatTime(audio.currentTime);
        totalTimeSpan.textContent = formatTime(audio.duration);
      }

      function setProgress(e) {
        const rect = progressBar.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;
        if (width && audio.duration) {
          audio.currentTime = (clickX / width) * audio.duration;
        }
      }

      function togglePlay() {
        if (audio.paused) {
          audio.play().catch(() => {});
        } else {
          audio.pause();
        }
        updateButtonState();
      }

      function updateButtonState() {
        if (audio.paused) {
          playIcon.style.display = 'block';
          pauseIcon.style.display = 'none';
        } else {
          playIcon.style.display = 'none';
          pauseIcon.style.display = 'block';
        }
      }

      // ===== ИНИЦИАЛИЗАЦИЯ =====
      audio.addEventListener('loadedmetadata', () => {
        totalTimeSpan.textContent = formatTime(audio.duration);
        updateProgress();
      });

      audio.addEventListener('timeupdate', updateProgress);
      audio.addEventListener('play', updateButtonState);
      audio.addEventListener('pause', updateButtonState);

      playPauseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        togglePlay();
      });

      progressBar.addEventListener('click', setProgress);

      heartBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        showLoveMessage();
      });

      setTimeout(() => {
        if (audio.duration && !isNaN(audio.duration)) {
          totalTimeSpan.textContent = formatTime(audio.duration);
        } else {
          totalTimeSpan.textContent = '3:17';
        }
        updateProgress();
      }, 500);

      document.querySelectorAll('img').forEach(img => {
        img.addEventListener('dragstart', (e) => e.preventDefault());
      });

      floatingMsg.classList.add('hidden');
      progressMessage.classList.add('hidden');
      availableIndices = loveMessages.map((_, index) => index);
      
      // Показываем начальное сообщение
      showProgressMessage("✨ Нажми на фотографии ✨")
 })();
  </script>
</body>
</html>
